<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Smart Ledger - AI Enhanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .tab-active { color: #10b981; border-bottom: 3px solid #10b981; }
        .card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-2px); shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: #10b981; color: white; border-radius: 16px; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .ai-gradient { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); }
    </style>
</head>
<body class="pb-28">

    <!-- Header -->
    <header class="bg-slate-900 text-white pt-10 pb-20 px-6 rounded-b-[48px] shadow-2xl relative overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-emerald-500/20 rounded-full blur-[80px]"></div>
        <div class="max-w-md mx-auto relative z-10">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-2xl font-black tracking-tight flex items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles text-emerald-400"></i> Smart Ledger
                    </h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">AI Financial Assistant ✨</p>
                </div>
                <button onclick="window.getAiInsight()" class="bg-emerald-500 hover:bg-emerald-400 text-white px-4 py-2 rounded-xl text-[11px] font-bold shadow-lg shadow-emerald-500/30 transition-all flex items-center gap-2">
                    TƯ VẤN ✨
                </button>
            </div>
            
            <div class="relative">
                <input id="main-input" type="text" 
                    placeholder="Ví dụ: 'Phở bò 45k' hoặc 'Gửi email cho khách'" 
                    class="w-full bg-white/10 border border-white/20 rounded-2xl py-4 pl-6 pr-14 text-white placeholder:text-slate-500 focus:bg-white/20 focus:ring-2 focus:ring-emerald-500/50 outline-none transition-all">
                <button id="send-btn" onclick="window.handleSubmit()" 
                    class="absolute right-2 top-2 bottom-2 btn-primary w-11 h-11 flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <i class="fa-solid fa-plus" id="send-icon"></i>
                </button>
            </div>
            <p id="ai-status" class="text-[10px] text-emerald-400/80 mt-3 font-medium text-center h-4"></p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto px-5 -mt-10 relative z-20">
        <!-- Stats -->
        <div class="card p-6 mb-8 grid grid-cols-2 gap-4 shadow-xl border-none">
            <div class="text-center border-r border-slate-100">
                <p class="text-[9px] text-slate-400 font-black uppercase mb-1">Tổng chi</p>
                <p id="total-money" class="text-xl font-black text-slate-800">0đ</p>
            </div>
            <div class="text-center">
                <p class="text-[9px] text-slate-400 font-black uppercase mb-1">Việc chưa xong</p>
                <p id="total-tasks" class="text-xl font-black text-slate-800">0</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-6 mb-6 px-2">
            <button id="tab-f" onclick="window.setTab('finance')" class="text-xs font-black tracking-widest tab-active pb-2">TÀI CHÍNH</button>
            <button id="tab-t" onclick="window.setTab('tasks')" class="text-xs font-black tracking-widest text-slate-400 pb-2">NHIỆM VỤ</button>
        </div>

        <!-- Items -->
        <div id="list-container" class="space-y-4 min-h-[200px]"></div>

        <!-- Footer Actions -->
        <div class="mt-10 flex flex-col items-center gap-4">
            <button onclick="window.clearAll()" class="text-[10px] font-bold text-slate-300 hover:text-rose-400 uppercase tracking-widest transition-all">
                <i class="fa-solid fa-trash-can mr-2"></i> Xóa toàn bộ dữ liệu
            </button>
        </div>
    </main>

    <!-- AI Suggestion Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center z-[110] p-6 backdrop-blur-md">
        <div class="card p-8 w-full max-w-sm border-none shadow-2xl animate-in zoom-in-95 duration-300">
            <div class="w-16 h-16 ai-gradient rounded-3xl flex items-center justify-center text-white mb-6 mx-auto shadow-lg shadow-emerald-500/40">
                <i class="fa-solid fa-robot text-3xl"></i>
            </div>
            <h3 class="font-black text-center text-slate-800 text-lg mb-2 uppercase">Trợ lý Gemini ✨</h3>
            <div id="ai-text" class="text-sm text-slate-600 leading-relaxed text-center mb-8 px-2 max-h-48 overflow-y-auto"></div>
            <div class="flex gap-3">
                <button onclick="window.closeAiModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold text-xs uppercase tracking-widest">Đóng</button>
                <button id="tts-btn" onclick="window.speakResult()" class="w-14 h-14 bg-emerald-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-6 left-6 right-6 bg-slate-900/95 text-white rounded-[28px] py-4 px-10 flex justify-between items-center shadow-2xl z-50 border border-white/10 backdrop-blur-sm">
        <button onclick="window.setTab('finance')" class="flex flex-col items-center gap-1.5 opacity-60 hover:opacity-100 transition-all">
            <i class="fa-solid fa-wallet text-sm"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Ví</span>
        </button>
        
        <button onclick="window.getAiInsight()" class="w-14 h-14 ai-gradient rounded-2xl flex items-center justify-center shadow-xl shadow-emerald-500/30 -mt-12 border-4 border-white transform hover:scale-110 transition-all">
            <i class="fa-solid fa-sparkles text-white text-lg"></i>
        </button>

        <button onclick="window.showSync()" class="flex flex-col items-center gap-1.5 opacity-60 hover:opacity-100 transition-all">
            <i class="fa-solid fa-cloud-bolt text-sm"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Sync</span>
        </button>
    </nav>

    <!-- Sync Modal -->
    <div id="sync-modal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center z-[100] p-6 backdrop-blur-sm">
        <div class="card p-8 w-full max-w-xs text-center border-none">
            <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400 mb-4 mx-auto">
                <i class="fa-solid fa-id-badge text-xl"></i>
            </div>
            <h3 class="font-black text-slate-800 mb-1 uppercase text-sm">Cloud ID</h3>
            <p class="text-[10px] text-slate-400 mb-6 font-medium">Dùng ID này để đồng bộ thiết bị khác</p>
            <div id="cloud-id-val" class="bg-slate-50 p-4 rounded-2xl text-[10px] font-mono break-all border border-slate-100 mb-8 select-all text-slate-600 font-bold">
                Đang lấy ID...
            </div>
            <button onclick="document.getElementById('sync-modal').classList.replace('flex', 'hidden')" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest">Hoàn tất</button>
        </div>
    </div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-[10px] font-bold opacity-0 transition-all pointer-events-none z-[200] border border-white/10 shadow-2xl"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // APP CONFIG
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const apiKey = ""; // Gemini API key

        let data = { finance: [], tasks: [] };
        let currentTab = 'finance';
        let user = null;
        let lastAiResult = "";

        // GEMINI AI INTEGRATION
        async function callGemini(prompt) {
            if (!apiKey) throw new Error("API Key Missing");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            
            if (!response.ok) throw new Error("API Error");
            const result = await response.json();
            return result.candidates?.[0]?.content?.parts?.[0]?.text;
        }

        async function speak(text) {
            if (!apiKey) return;
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say in a friendly Vietnamese voice: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const audioBlob = pcmToWav(pcmData, 24000);
                const audio = new Audio(URL.createObjectURL(audioBlob));
                audio.play();
            } catch (e) { console.warn("TTS Error", e); }
        }

        function pcmToWav(base64Pcm, sampleRate) {
            const pcmBuffer = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false); // RIFF
            view.setUint32(4, 36 + pcmBuffer.byteLength, true);
            view.setUint32(8, 0x57415645, false); // WAVE
            view.setUint32(12, 0x666d7420, false); // fmt 
            view.setUint16(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // data
            view.setUint32(40, pcmBuffer.byteLength, true);
            return new Blob([wavHeader, pcmBuffer], { type: 'audio/wav' });
        }

        // SMART OFFLINE PARSER
        function fastParse(text) {
            const moneyMatch = text.match(/(\d+)(k|K|000)/);
            if (moneyMatch) {
                const multi = moneyMatch[2].toLowerCase() === 'k' ? 1000 : 1;
                const amt = parseInt(moneyMatch[1]) * multi;
                const name = text.replace(moneyMatch[0], '').trim() || "Tiêu dùng";
                return { type: 'finance', name, amt };
            }
            return { type: 'task', name: text };
        }

        // APP LOGIC
        window.setTab = (t) => {
            currentTab = t;
            document.getElementById('tab-f').className = t === 'finance' ? 'text-xs font-black tracking-widest tab-active pb-2 transition-all' : 'text-xs font-black tracking-widest text-slate-400 pb-2 transition-all';
            document.getElementById('tab-t').className = t === 'tasks' ? 'text-xs font-black tracking-widest tab-active pb-2 transition-all' : 'text-xs font-black tracking-widest text-slate-400 pb-2 transition-all';
            render();
        };

        window.handleSubmit = async () => {
            const input = document.getElementById('main-input');
            const status = document.getElementById('ai-status');
            const val = input.value.trim();
            if (!val) return;

            status.innerText = "Đã lưu nhanh ✨";
            const result = fastParse(val);
            const now = new Date().toLocaleDateString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            if (result.type === 'finance') {
                data.finance.unshift({ name: result.name, amt: result.amt, date: now });
                window.setTab('finance');
            } else {
                data.tasks.unshift({ name: result.name, done: false, date: now });
                window.setTab('tasks');
            }

            input.value = "";
            save();
            setTimeout(() => status.innerText = "", 2000);
        };

        window.getAiInsight = async () => {
            const modal = document.getElementById('ai-modal');
            const textEl = document.getElementById('ai-text');
            modal.classList.replace('hidden', 'flex');
            textEl.innerHTML = '<p class="loading-pulse font-bold uppercase text-[10px] tracking-widest">Đang kết nối Gemini ✨</p>';

            const context = `Phân tích dữ liệu người dùng:
            - Chi tiêu: ${JSON.stringify(data.finance)}
            - Nhiệm vụ: ${JSON.stringify(data.tasks)}
            
            Hãy đưa ra 1 lời khuyên tài chính dựa trên các hạng mục chi tiêu nhiều nhất và 1 gợi ý ưu tiên công việc. Trả lời bằng tiếng Việt, thân thiện, súc tích trong 3 câu.`;

            try {
                const insight = await callGemini(context);
                textEl.innerText = insight;
                lastAiResult = insight;
            } catch (e) {
                textEl.innerText = "Trợ lý AI đang bận, vui lòng thử lại sau!";
            }
        };

        window.speakResult = () => {
            if (lastAiResult) speak(lastAiResult);
        };

        window.closeAiModal = () => document.getElementById('ai-modal').classList.replace('flex', 'hidden');

        window.delItem = (i) => {
            data[currentTab].splice(i, 1);
            save();
        };

        window.toggleTask = (i) => {
            data.tasks[i].done = !data.tasks[i].done;
            save();
        };

        window.clearAll = () => {
            if (confirm("Xóa toàn bộ dữ liệu?")) {
                data = { finance: [], tasks: [] };
                save();
            }
        };

        window.showSync = () => document.getElementById('sync-modal').classList.replace('hidden', 'flex');

        function render() {
            const list = document.getElementById('list-container');
            const totalM = data.finance.reduce((s, x) => s + (Number(x.amt) || 0), 0);
            const totalT = data.tasks.filter(x => !x.done).length;

            document.getElementById('total-money').innerText = totalM.toLocaleString() + 'đ';
            document.getElementById('total-tasks').innerText = totalT;

            const items = data[currentTab] || [];
            if (items.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 text-[10px] font-black uppercase tracking-widest italic opacity-50">Danh sách trống</div>`;
                return;
            }

            list.innerHTML = items.map((item, i) => `
                <div class="card p-5 flex justify-between items-center animate-in slide-in-from-bottom-3 duration-300">
                    <div class="flex items-center gap-4">
                        ${currentTab === 'tasks' ? `
                            <button onclick="window.toggleTask(${i})" class="w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all ${item.done ? 'bg-emerald-500 border-emerald-500 text-white shadow-lg shadow-emerald-500/30' : 'border-slate-100 text-transparent'}">
                                <i class="fa-solid fa-check text-[10px]"></i>
                            </button>
                        ` : `
                            <div class="w-10 h-10 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-500">
                                <i class="fa-solid fa-receipt"></i>
                            </div>
                        `}
                        <div>
                            <p class="font-bold text-sm ${item.done ? 'line-through text-slate-300' : 'text-slate-800'}">${item.name}</p>
                            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-tight">${item.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        ${currentTab === 'finance' ? `<span class="font-black text-rose-500 text-sm">-${Number(item.amt).toLocaleString()}đ</span>` : ''}
                        <button onclick="window.delItem(${i})" class="w-8 h-8 rounded-full hover:bg-rose-50 text-slate-200 hover:text-rose-400 transition-all flex items-center justify-center">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function save() {
            render();
            if (!user) return;
            const ref = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'v8_ai_enhanced');
            await setDoc(ref, data);
        }

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('cloud-id-val').innerText = u.uid;
                onSnapshot(doc(db, 'artifacts', appId, 'users', u.uid, 'data', 'v8_ai_enhanced'), (snap) => {
                    if (snap.exists()) { data = snap.data(); render(); }
                });
            }
        });

        document.getElementById('main-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') window.handleSubmit(); });
        signInAnonymously(auth);
        render();
    </script>
</body>
</html>
