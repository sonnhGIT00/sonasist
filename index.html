<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Ledger Cloud - ✨ Sync Everything</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #0f172a; touch-action: manipulation; overflow-x: hidden; }
        .tab-active { color: #10b981; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -8px; left: 25%; width: 50%; height: 3px; background: #10b981; border-radius: 10px; }
        .card { background: white; border-radius: 32px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); }
        .ai-gradient { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); }
        .btn-primary { background: #10b981; color: white; border-radius: 18px; transition: all 0.2s; font-weight: 800; cursor: pointer; border: none; }
        .btn-primary:active { transform: scale(0.95); opacity: 0.9; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .loader { width: 24px; height: 24px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-36">

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-6">
        <div class="card p-10 w-full max-w-sm text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 ai-gradient"></div>
            <div class="w-20 h-20 ai-gradient rounded-[28px] flex items-center justify-center mx-auto mb-6 shadow-xl">
                <i class="fa-solid fa-cloud-bolt text-white text-3xl"></i>
            </div>
            <h2 class="text-xl font-extrabold text-slate-900 mb-2">Cloud Sync Pro</h2>
            <p class="text-slate-500 text-xs mb-8 leading-relaxed">Đồng bộ dữ liệu an toàn trên đám mây.</p>
            <button id="login-btn" class="w-full py-5 btn-primary text-xs uppercase tracking-widest flex items-center justify-center gap-3">
                <span id="btn-text">KÍCH HOẠT ĐỒNG BỘ</span>
                <span id="btn-loader" class="loader hidden"></span>
            </button>
            <p id="auth-error" class="text-rose-500 text-[10px] font-bold mt-4 hidden"></p>
        </div>
    </div>

    <!-- App Header -->
    <header id="app-header" class="bg-slate-900 text-white pt-12 pb-24 px-8 rounded-b-[60px] shadow-2xl relative hidden">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 ai-gradient rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-bolt text-white"></i>
                    </div>
                    <h1 class="text-xl font-extrabold tracking-tight">SONASIST</h1>
                </div>
                <button onclick="window.handleLogout()" class="w-10 h-10 bg-white/10 rounded-2xl flex items-center justify-center text-rose-400">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
            <div class="relative">
                <input id="main-input" type="text" placeholder="Ghi 'Ăn sáng 30k'..." class="w-full bg-white/10 border border-white/20 rounded-3xl py-5 pl-7 pr-16 text-white outline-none focus:bg-white/20 transition-all">
                <button onclick="window.handleSubmit()" class="absolute right-2 top-2 bottom-2 w-12 h-12 btn-primary flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app-main" class="max-w-md mx-auto px-6 -mt-14 relative z-20 hidden">
        <div class="card p-8 mb-8">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Tổng chi tiêu</p>
                    <h2 id="total-money" class="text-3xl font-black text-slate-900">0đ</h2>
                </div>
                <div class="h-16 w-32">
                    <canvas id="spendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="flex gap-8 mb-6">
            <button id="tab-f" onclick="window.setTab('finance')" class="text-xs font-bold tab-active uppercase">Tài chính</button>
            <button id="tab-t" onclick="window.setTab('tasks')" class="text-xs font-bold text-slate-400 uppercase">Công việc</button>
        </div>

        <div id="list-container" class="space-y-4"></div>
    </main>

    <!-- Bottom Nav -->
    <nav id="app-nav" class="fixed bottom-8 left-8 right-8 glass rounded-[30px] py-5 px-10 flex justify-between items-center shadow-2xl hidden">
        <button onclick="window.setTab('finance')" class="text-slate-400 hover:text-emerald-500"><i class="fa-solid fa-wallet text-xl"></i></button>
        <button onclick="alert('Đang phân tích AI...')" class="w-14 h-14 ai-gradient rounded-3xl flex items-center justify-center -mt-12 border-4 border-white shadow-xl">
            <i class="fa-solid fa-sparkles text-white text-xl"></i>
        </button>
        <button onclick="window.setTab('tasks')" class="text-slate-400 hover:text-emerald-500"><i class="fa-solid fa-list-check text-xl"></i></button>
    </nav>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        let data = { finance: [], tasks: [] };
        let currentTab = 'finance';
        let chartInstance = null;

        const config = JSON.parse(__firebase_config);
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sonasist-app-v1';

        const showApp = () => {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('app-header').classList.remove('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            document.getElementById('app-nav').classList.remove('hidden');
            render();
        };

        // --- Auth Events ---
        document.getElementById('login-btn').addEventListener('click', async () => {
            document.getElementById('btn-text').classList.add('hidden');
            document.getElementById('btn-loader').classList.remove('hidden');
            
            try {
                // Thử đăng nhập, nếu quá 5s không được thì tự vào app luôn
                const authPromise = signInAnonymously(auth);
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject('timeout'), 5000));
                
                await Promise.race([authPromise, timeoutPromise]);
            } catch (err) {
                console.warn("Auth failed or timed out, entering offline mode.");
                showApp(); // Vào app luôn nếu lỗi mạng/timeout
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                showApp();
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'ledger');
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        data = snap.data();
                        render();
                    }
                });

                window.cloudSave = () => setDoc(docRef, data);
            }
        });

        window.handleLogout = () => signOut(auth).then(() => location.reload());

        // --- App Logic ---
        window.setTab = (t) => { currentTab = t; render(); };

        window.handleSubmit = () => {
            const input = document.getElementById('main-input');
            const val = input.value.trim();
            if (!val) return;

            const moneyMatch = val.match(/(\d+)\s*(k|K|000|đ|d)/i);
            const now = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            if (moneyMatch) {
                let amt = parseInt(moneyMatch[1]);
                if (moneyMatch[2].toLowerCase() === 'k') amt *= 1000;
                data.finance.unshift({ name: val.replace(moneyMatch[0], '').trim() || "Chi tiêu", amt, date: now });
            } else {
                data.tasks.unshift({ name: val, done: false, date: now });
            }

            input.value = "";
            if (auth.currentUser) window.cloudSave();
            render();
        };

        window.render = () => {
            const list = document.getElementById('list-container');
            const totalM = data.finance.reduce((s, x) => s + (x.amt || 0), 0);
            
            document.getElementById('total-money').innerText = totalM.toLocaleString() + 'đ';
            document.getElementById('tab-f').className = currentTab === 'finance' ? 'text-xs font-bold tab-active uppercase' : 'text-xs font-bold text-slate-400 uppercase';
            document.getElementById('tab-t').className = currentTab === 'tasks' ? 'text-xs font-bold tab-active uppercase' : 'text-xs font-bold text-slate-400 uppercase';

            const items = data[currentTab] || [];
            if (items.length === 0) {
                list.innerHTML = `<div class="py-10 text-center opacity-30 text-[10px] font-bold uppercase tracking-widest">Trống</div>`;
            } else {
                list.innerHTML = items.map((item, i) => `
                    <div class="card p-5 flex justify-between items-center animate-pop">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-emerald-500">
                                <i class="fa-solid ${currentTab === 'tasks' ? 'fa-check-circle' : 'fa-receipt'}"></i>
                            </div>
                            <div>
                                <p class="font-bold text-sm text-slate-800">${item.name}</p>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">${item.date}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            ${currentTab === 'finance' ? `<span class="font-black text-rose-500 text-sm">-${(item.amt||0).toLocaleString()}đ</span>` : ''}
                            <button onclick="window.delItem(${i})" class="text-slate-200 hover:text-rose-500 transition-colors"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                    </div>`).join('');
            }
            updateChart();
        };

        window.delItem = (i) => {
            data[currentTab].splice(i, 1);
            if (auth.currentUser) window.cloudSave();
            render();
        };

        function updateChart() {
            const ctx = document.getElementById('spendChart').getContext('2d');
            const vals = data.finance.slice(0, 5).map(x => x.amt).reverse();
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: vals.map((_, i) => i),
                    datasets: [{ data: vals, borderColor: '#10b981', tension: 0.4, borderWidth: 3, pointRadius: 0, fill: false }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        document.getElementById('main-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.handleSubmit(); });
    </script>
</body>
</html>
