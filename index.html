<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Smart Ledger - Chat & Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; }
        .ai-btn { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .chat-bubble-user { background: #6366f1; color: white; border-radius: 18px 18px 2px 18px; }
        .chat-bubble-ai { background: #f1f5f9; color: #1e293b; border-radius: 18px 18px 18px 2px; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="bg-indigo-600 text-white pt-8 pb-16 px-6 rounded-b-[40px] shadow-lg relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16"></div>
        <div class="max-w-md mx-auto flex justify-between items-center mb-6 relative z-10">
            <div>
                <h1 class="text-xl font-800 tracking-tight">SMART LEDGER</h1>
                <div class="flex items-center gap-2">
                    <span id="status-dot" class="w-2 h-2 bg-green-400 rounded-full"></span>
                    <p id="status-text" class="text-[9px] opacity-70 uppercase font-bold tracking-widest text-white">Sẵn sàng</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="exportData()" class="w-9 h-9 bg-white/15 rounded-xl flex items-center justify-center hover:bg-white/25"><i class="fa-solid fa-cloud-arrow-up text-sm"></i></button>
                <button onclick="importData()" class="w-9 h-9 bg-white/15 rounded-xl flex items-center justify-center hover:bg-white/25"><i class="fa-solid fa-file-import text-sm"></i></button>
            </div>
        </div>

        <div class="max-w-md mx-auto relative z-10">
            <div class="flex gap-2 bg-white rounded-2xl p-2 shadow-2xl">
                <input id="main-input" type="text" placeholder="Ghi 'Ăn tối 100k' hoặc hỏi AI..." class="flex-1 bg-transparent px-3 py-3 text-slate-800 outline-none text-sm">
                <button onclick="document.getElementById('img-upload').click()" class="w-11 h-11 flex items-center justify-center text-slate-400 hover:text-indigo-600">
                    <i class="fa-solid fa-camera-retro text-lg"></i>
                </button>
                <button id="send-btn" onclick="handleAction()" class="w-11 h-11 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg active:scale-90 transition-transform">
                    <i id="send-icon" class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <input type="file" id="img-upload" class="hidden" accept="image/*" onchange="handleImage(event)">
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-md mx-auto px-6 -mt-8 relative z-20">
        <!-- Stats -->
        <div id="stats-row" class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-5 shadow-sm border-b-4 border-rose-400">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Đã chi tiêu</p>
                <h2 id="total-spent" class="text-xl font-800 text-slate-900">0đ</h2>
            </div>
            <div class="glass-card p-5 shadow-sm border-b-4 border-indigo-400">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Việc cần làm</p>
                <h2 id="total-tasks" class="text-xl font-800 text-slate-900">0</h2>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex justify-between items-center mb-6 px-2 border-b border-slate-200">
            <div class="flex gap-6">
                <button onclick="setTab('finance')" id="tab-finance" class="text-xs font-bold text-indigo-600 border-b-2 border-indigo-600 pb-2 transition-all">TÀI CHÍNH</button>
                <button onclick="setTab('tasks')" id="tab-tasks" class="text-xs font-bold text-slate-400 pb-2 transition-all">CÔNG VIỆC</button>
                <button onclick="setTab('ai')" id="tab-ai" class="text-xs font-bold text-slate-400 pb-2 transition-all">TRỢ LÝ AI</button>
            </div>
            <button onclick="clearChat()" id="clear-chat-btn" class="hidden text-[10px] font-bold text-rose-400 uppercase">Xóa Chat</button>
        </div>

        <!-- List / Chat Container -->
        <div id="list-container" class="space-y-3 pb-20"></div>
    </main>

    <script>
        const apiKey = ""; 
        let ledgerData = JSON.parse(localStorage.getItem('my_ledger_v4')) || { 
            finance: [], 
            tasks: [], 
            chat: [{ role: 'ai', text: 'Chào bạn! Tôi đã sẵn sàng hỗ trợ. Bạn có thể nhập chi tiêu, công việc hoặc đặt câu hỏi về dữ liệu của mình tại đây.', date: '' }] 
        };
        let currentTab = 'finance';

        function init() {
            render();
            checkOnline();
            window.addEventListener('online', checkOnline);
            window.addEventListener('offline', checkOnline);
        }

        function checkOnline() {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            if (navigator.onLine) {
                dot.className = "w-2 h-2 bg-green-400 rounded-full";
                txt.innerText = "Sẵn sàng (Online)";
            } else {
                dot.className = "w-2 h-2 bg-rose-400 rounded-full";
                txt.innerText = "Chỉ dùng Offline";
            }
        }

        // Tự động nhận diện: Nếu là hỏi (có dấu ?) hoặc tab AI đang mở thì ưu tiên chat
        function handleAction() {
            const input = document.getElementById('main-input');
            const val = input.value.trim();
            if (!val) return;

            const isQuestion = val.includes('?') || currentTab === 'ai';
            
            if (isQuestion) {
                setTab('ai');
                askAI(val);
            } else {
                processInput(val);
            }
            input.value = "";
        }

        function processInput(val) {
            const now = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + " " + new Date().toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
            const moneyMatch = val.match(/(\d+[\d\.]*)\s*(k|K|000|đ|d)/i);

            if (moneyMatch) {
                let amountStr = moneyMatch[1].replace(/\./g, '');
                let amount = parseInt(amountStr);
                if (moneyMatch[2].toLowerCase() === 'k') amount *= 1000;
                const name = val.replace(moneyMatch[0], '').trim() || "Chi tiêu";
                ledgerData.finance.unshift({ id: Date.now(), name, amount, date: now });
                setTab('finance');
            } else {
                ledgerData.tasks.unshift({ id: Date.now(), name: val, done: false, date: now });
                setTab('tasks');
            }
            save();
            render();
        }

        async function askAI(userText) {
            const now = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
            
            // Thêm câu hỏi của user vào lịch sử
            ledgerData.chat.push({ role: 'user', text: userText, date: now });
            render();

            if (!navigator.onLine) {
                ledgerData.chat.push({ role: 'ai', text: 'Xin lỗi, tôi cần kết nối mạng để trả lời câu hỏi này.', date: now });
                render();
                return;
            }

            // Tạo ngữ cảnh từ dữ liệu hiện có
            const history = ledgerData.chat.slice(-6).map(c => `${c.role === 'user' ? 'Người dùng' : 'AI'}: ${c.text}`).join('\n');
            const context = `
                Dữ liệu tài chính gần đây: ${JSON.stringify(ledgerData.finance.slice(0, 5))}.
                Việc cần làm: ${JSON.stringify(ledgerData.tasks.filter(t=>!t.done).slice(0, 5))}.
                Lịch sử trò chuyện:\n${history}\n
                Người dùng vừa hỏi: "${userText}". 
                Hãy trả lời dựa trên dữ liệu trên. Nếu người dùng hỏi về tổng chi, hãy tính toán giúp họ. Trả lời ngắn gọn, thân thiện.
            `;

            try {
                const sendIcon = document.getElementById('send-icon');
                sendIcon.className = "fa-solid fa-spinner fa-spin";

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
                });
                const result = await response.json();
                const aiResponse = result.candidates[0].content.parts[0].text;
                
                ledgerData.chat.push({ role: 'ai', text: aiResponse, date: now });
                sendIcon.className = "fa-solid fa-paper-plane";
                save();
                render();
                
                // Cuộn xuống cuối chat
                const container = document.getElementById('list-container');
                container.scrollTop = container.scrollHeight;

            } catch (error) {
                ledgerData.chat.push({ role: 'ai', text: 'Có lỗi kết nối AI, tôi chưa thể trả lời ngay.', date: now });
                document.getElementById('send-icon').className = "fa-solid fa-paper-plane";
                render();
            }
        }

        function render() {
            const list = document.getElementById('list-container');
            const totalS = ledgerData.finance.reduce((acc, curr) => acc + curr.amount, 0);
            const totalT = ledgerData.tasks.filter(t => !t.done).length;

            document.getElementById('total-spent').innerText = totalS.toLocaleString() + 'đ';
            document.getElementById('total-tasks').innerText = totalT;

            // Hiển thị nút xóa chat nếu đang ở tab AI
            document.getElementById('clear-chat-btn').classList.toggle('hidden', currentTab !== 'ai');

            if (currentTab === 'ai') {
                list.innerHTML = ledgerData.chat.map(msg => `
                    <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} mb-4 animate-pop">
                        <div class="max-w-[85%] p-4 ${msg.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai shadow-sm border border-slate-100'}">
                            <p class="text-sm leading-relaxed">${msg.text}</p>
                            <p class="text-[8px] mt-1 opacity-50 font-bold uppercase">${msg.date}</p>
                        </div>
                    </div>
                `).join('');
                return;
            }

            const items = currentTab === 'finance' ? ledgerData.finance : ledgerData.tasks;
            if (items.length === 0) {
                list.innerHTML = `<div class="py-16 text-center opacity-20 text-[10px] font-bold uppercase tracking-[0.3em]">Danh sách trống</div>`;
                return;
            }

            list.innerHTML = items.map((item, idx) => `
                <div class="glass-card p-4 flex justify-between items-center animate-pop">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400">
                            <i class="fa-solid ${currentTab === 'finance' ? 'fa-wallet' : (item.done ? 'fa-circle-check text-green-500' : 'fa-circle-dot')}"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-800 ${item.done ? 'line-through opacity-30' : ''}">${item.name}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tight">${item.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        ${currentTab === 'finance' ? `<span class="text-sm font-black text-rose-500">-${item.amount.toLocaleString()}đ</span>` : 
                        `<button onclick="toggleTask(${idx})" class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center"><i class="fa-solid fa-check text-xs"></i></button>`}
                        <button onclick="removeItem(${idx})" class="text-slate-200 hover:text-rose-400 p-2"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function setTab(t) {
            currentTab = t;
            ['finance', 'tasks', 'ai'].forEach(id => {
                const el = document.getElementById('tab-' + id);
                if (id === t) {
                    el.className = "text-xs font-bold text-indigo-600 border-b-2 border-indigo-600 pb-2";
                } else {
                    el.className = "text-xs font-bold text-slate-400 pb-2";
                }
            });
            render();
        }

        async function handleImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            setTab('ai');
            ledgerData.chat.push({ role: 'ai', text: 'Đang phân tích hình ảnh của bạn...', date: '' });
            render();

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result.split(',')[1];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Phân tích ảnh này và trích xuất thông tin tài chính hoặc công việc." },
                                    { inlineData: { mimeType: "image/png", data: base64Data } }
                                ]
                            }]
                        })
                    });
                    const result = await response.json();
                    ledgerData.chat.push({ role: 'ai', text: result.candidates[0].content.parts[0].text, date: 'AI Vision' });
                    save();
                    render();
                } catch (err) {
                    ledgerData.chat.push({ role: 'ai', text: 'Lỗi đọc ảnh.', date: '' });
                    render();
                }
            };
            reader.readAsDataURL(file);
        }

        function clearChat() { if(confirm("Xóa toàn bộ lịch sử chat?")) { ledgerData.chat = [ledgerData.chat[0]]; save(); render(); } }
        function toggleTask(i) { ledgerData.tasks[i].done = !ledgerData.tasks[i].done; save(); render(); }
        function removeItem(i) { if(confirm("Xóa mục này?")) { ledgerData[currentTab].splice(i, 1); save(); render(); } }
        function save() { localStorage.setItem('my_ledger_v4', JSON.stringify(ledgerData)); }

        function exportData() {
            const code = btoa(unescape(encodeURIComponent(JSON.stringify(ledgerData))));
            const temp = document.createElement('textarea');
            temp.value = code;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("Đã copy mã sao lưu!");
        }

        function importData() {
            const code = prompt("Dán mã sao lưu:");
            if (code) {
                try {
                    ledgerData = JSON.parse(decodeURIComponent(escape(atob(code))));
                    save(); render();
                } catch(e) { alert("Lỗi!"); }
            }
        }

        window.onload = init;
        document.getElementById('main-input').onkeydown = (e) => { if(e.key === 'Enter') handleAction(); };
    </script>
</body>
</html>
