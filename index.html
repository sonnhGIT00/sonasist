<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Smart Ledger - Đơn Giản & Hiệu Quả</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); border-radius: 24px; }
        .ai-btn { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; }
        .custom-shadow { box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-indigo-600 text-white pt-8 pb-16 px-6 rounded-b-[40px] shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-800 tracking-tight">SMART LEDGER</h1>
                <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest">AI Personal Assistant</p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportData()" class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center text-xs" title="Sao lưu"><i class="fa-solid fa-file-export"></i></button>
                <button onclick="importData()" class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center text-xs" title="Khôi phục"><i class="fa-solid fa-file-import"></i></button>
            </div>
        </div>

        <div class="max-w-md mx-auto relative">
            <div class="flex gap-2 bg-white rounded-2xl p-1.5 shadow-xl">
                <input id="main-input" type="text" placeholder="Nhập: 'Cơm trưa 50k'..." class="flex-1 bg-transparent px-4 py-3 text-slate-800 outline-none text-sm">
                <button onclick="document.getElementById('img-upload').click()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-indigo-600 transition-colors">
                    <i class="fa-solid fa-camera"></i>
                </button>
                <button onclick="processInput()" class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <input type="file" id="img-upload" class="hidden" accept="image/*" onchange="handleImage(event)">
        </div>
    </header>

    <!-- Content -->
    <main class="max-w-md mx-auto px-6 -mt-8">
        <!-- Stats -->
        <div class="glass-card p-6 flex justify-between items-center custom-shadow mb-6">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Đã chi tiêu</p>
                <h2 id="total-spent" class="text-2xl font-800 text-slate-900">0đ</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Việc cần làm</p>
                <h2 id="total-tasks" class="text-2xl font-800 text-indigo-600">0</h2>
            </div>
        </div>

        <!-- AI Advice Box -->
        <div id="ai-response" class="hidden mb-6 p-5 glass-card border-l-4 border-indigo-500 bg-indigo-50/50 animate-pop">
            <div class="flex items-center gap-2 mb-2">
                <i class="fa-solid fa-sparkles text-indigo-500 text-sm"></i>
                <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">Tư vấn AI</span>
            </div>
            <p id="ai-text" class="text-sm text-slate-700 leading-relaxed"></p>
        </div>

        <!-- Tabs -->
        <div class="flex gap-6 mb-4 px-2">
            <button onclick="setTab('finance')" id="tab-finance" class="text-xs font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1">TÀI CHÍNH</button>
            <button onclick="setTab('tasks')" id="tab-tasks" class="text-xs font-bold text-slate-400 pb-1">CÔNG VIỆC</button>
        </div>

        <!-- List -->
        <div id="list-container" class="space-y-3"></div>
    </main>

    <!-- Bottom Action -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-6">
        <button onclick="askAI()" class="w-full py-4 ai-btn rounded-2xl font-bold shadow-xl shadow-indigo-200 flex items-center justify-center gap-3">
            <i class="fa-solid fa-robot"></i>
            HỎI AI VỀ DỮ LIỆU
        </button>
    </div>

    <script>
        // Cấu hình AI (Dùng key trống để hệ thống tự cấp quyền)
        const apiKey = ""; 
        let ledgerData = JSON.parse(localStorage.getItem('my_ledger_v2')) || { finance: [], tasks: [] };
        let currentTab = 'finance';

        // Khởi tạo ứng dụng
        function init() {
            render();
            // Tự động chào mừng nếu lần đầu dùng
            if (ledgerData.finance.length === 0 && ledgerData.tasks.length === 0) {
                document.getElementById('ai-response').classList.remove('hidden');
                document.getElementById('ai-text').innerText = "Chào bạn! Tôi là trợ lý AI. Bạn hãy nhập thử 'Ăn trưa 50k' hoặc 'Mua tã cho con' để bắt đầu nhé.";
            }
        }

        // Xử lý nhập liệu
        function processInput() {
            const input = document.getElementById('main-input');
            const val = input.value.trim();
            if (!val) return;

            const now = new Date().toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
            const moneyMatch = val.match(/(\d+)\s*(k|K|000|đ|d)/i);

            if (moneyMatch) {
                let amount = parseInt(moneyMatch[1]);
                if (moneyMatch[2].toLowerCase() === 'k') amount *= 1000;
                const name = val.replace(moneyMatch[0], '').trim() || "Chi tiêu không tên";
                ledgerData.finance.unshift({ id: Date.now(), name, amount, date: now });
            } else {
                ledgerData.tasks.unshift({ id: Date.now(), name: val, done: false, date: now });
            }

            input.value = "";
            save();
            render();
        }

        // AI Phân tích & Tư vấn
        async function askAI() {
            const textEl = document.getElementById('ai-text');
            const box = document.getElementById('ai-response');
            
            box.classList.remove('hidden');
            textEl.innerText = "Đang phân tích dữ liệu...";

            const context = `Dữ liệu tài chính hiện tại: ${JSON.stringify(ledgerData.finance.slice(0, 10))}. 
                            Dữ liệu công việc: ${JSON.stringify(ledgerData.tasks.slice(0, 10))}.
                            Hãy đưa ra 1 câu nhận xét ngắn gọn và 1 lời khuyên tài chính thông minh cho người dùng.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
                });
                const result = await response.json();
                const aiText = result.candidates[0].content.parts[0].text;
                textEl.innerText = aiText;
            } catch (error) {
                textEl.innerText = "AI đang bận, bạn hãy thử lại sau nhé!";
            }
        }

        // Sao lưu & Phục hồi
        function exportData() {
            const str = btoa(unescape(encodeURIComponent(JSON.stringify(ledgerData))));
            const code = prompt("Đây là mã sao lưu của bạn. Hãy copy và lưu lại:", str);
        }

        function importData() {
            const code = prompt("Dán mã sao lưu vào đây:");
            if (code) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(escape(atob(code))));
                    ledgerData = decoded;
                    save();
                    render();
                    alert("Khôi phục thành công!");
                } catch(e) { alert("Mã không hợp lệ!"); }
            }
        }

        // Render giao diện
        function render() {
            const list = document.getElementById('list-container');
            const totalS = ledgerData.finance.reduce((acc, curr) => acc + curr.amount, 0);
            const totalT = ledgerData.tasks.filter(t => !t.done).length;

            document.getElementById('total-spent').innerText = totalS.toLocaleString() + 'đ';
            document.getElementById('total-tasks').innerText = totalT;

            const items = currentTab === 'finance' ? ledgerData.finance : ledgerData.tasks;
            
            if (items.length === 0) {
                list.innerHTML = `<div class="py-20 text-center opacity-30 text-xs font-bold uppercase tracking-widest">Chưa có dữ liệu</div>`;
                return;
            }

            list.innerHTML = items.map((item, idx) => `
                <div class="glass-card p-4 flex justify-between items-center animate-pop border border-white/50">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-indigo-500">
                            <i class="fa-solid ${currentTab === 'finance' ? 'fa-wallet' : (item.done ? 'fa-check-circle text-green-500' : 'fa-circle-notch')}"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-800 ${item.done ? 'line-through opacity-40' : ''}">${item.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${item.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        ${currentTab === 'finance' ? `<span class="text-sm font-black text-rose-500">-${item.amount.toLocaleString()}đ</span>` : 
                        `<button onclick="toggleTask(${idx})" class="text-xs font-bold text-indigo-600">${item.done ? 'Mở' : 'Xong'}</button>`}
                        <button onclick="removeItem(${idx})" class="text-slate-300 hover:text-rose-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // Utils
        function setTab(t) {
            currentTab = t;
            document.getElementById('tab-finance').className = t === 'finance' ? 'text-xs font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1' : 'text-xs font-bold text-slate-400 pb-1';
            document.getElementById('tab-tasks').className = t === 'tasks' ? 'text-xs font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1' : 'text-xs font-bold text-slate-400 pb-1';
            render();
        }

        function handleImage(e) {
            alert("Đã nhận hình ảnh! Tính năng quét hóa đơn đang được tối ưu.");
            // Ở đây có thể tích hợp Gemini Vision để đọc text từ ảnh
        }

        function toggleTask(i) { ledgerData.tasks[i].done = !ledgerData.tasks[i].done; save(); render(); }
        function removeItem(i) { if(confirm("Xóa mục này?")) { ledgerData[currentTab].splice(i, 1); save(); render(); } }
        function save() { localStorage.setItem('my_ledger_v2', JSON.stringify(ledgerData)); }

        window.onload = init;
        document.getElementById('main-input').onkeydown = (e) => { if(e.key === 'Enter') processInput(); };
    </script>
</body>
</html>
